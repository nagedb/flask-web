{% extends "base.html" %}

{% block title %}{{ title or '调度配置' }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ title }}</h1>
    <a href="{{ url_for('main.schedule_list') }}" class="btn btn-secondary">← 返回列表</a>
</div>

{% if error %}
<div class="alert alert-error">
    <strong>错误:</strong> {{ error }}
</div>
{% endif %}

<div class="card form-card">
    <form id="schedule-form" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="company_short_name">公司简称 *</label>
                <input type="text" name="company_short_name" id="company_short_name" 
                       value="{% if config and config.get('company_short_name') %}{{ config.company_short_name }}{% endif %}"
                       placeholder="如: ABC, XYZ" required>
            </div>
            
            <div class="form-group">
                <label for="workflow_name">工作流名称 *</label>
                <input type="text" name="workflow_name" id="workflow_name"
                       value="{% if config and config.get('workflow_name') %}{{ config.workflow_name }}{% endif %}"
                       placeholder="如: 日报生成, 数据同步" required>
            </div>
        </div>

        <div class="form-group">
            <label for="schedule_type">调度类型 *</label>
            <select name="schedule_type" id="schedule_type" required onchange="updateScheduleFields()">
                <option value="">-- 选择调度类型 --</option>
                <option value="cron" {% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'cron' %}selected{% endif %}>
                    Cron 表达式 (定时任务)
                </option>
                <option value="interval" {% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'interval' %}selected{% endif %}>
                    时间间隔 (周期执行)
                </option>
                <option value="once" {% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'once' %}selected{% endif %}>
                    一次性 (指定时间)
                </option>
            </select>
        </div>

        <!-- Cron 配置 -->
        <div id="cron-fields" class="schedule-fields" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label for="cron_expression">Cron 表达式 *</label>
                    <input type="text" name="cron_expression" id="cron_expression"
                           value="{% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'cron' %}{{ config.schedule_config.get('expression', '') }}{% endif %}"
                           placeholder="如: 0 9 * * MON-FRI">
                    <small>格式: 分 时 日 月 周</small>
                </div>
                
                <div class="form-group">
                    <label for="timezone">时区</label>
                    <input type="text" name="timezone" id="timezone"
                           value="{% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'cron' %}{{ config.schedule_config.get('timezone', 'Asia/Shanghai') }}{% else %}Asia/Shanghai{% endif %}"
                           placeholder="Asia/Shanghai">
                </div>
            </div>
        </div>

        <!-- 时间间隔配置 -->
        <div id="interval-fields" class="schedule-fields" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label for="interval_minutes">间隔分钟数 *</label>
                    <input type="number" name="interval_minutes" id="interval_minutes"
                           value="{% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'interval' %}{{ config.schedule_config.get('interval_minutes', 30) }}{% else %}30{% endif %}"
                           min="1" placeholder="30">
                </div>
                
                <div class="form-group">
                    <label for="start_time">开始时间</label>
                    <input type="time" name="start_time" id="start_time"
                           value="{% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'interval' %}{{ config.schedule_config.get('start_time', '08:00') }}{% else %}08:00{% endif %}">
                </div>
                
                <div class="form-group">
                    <label for="end_time">结束时间</label>
                    <input type="time" name="end_time" id="end_time"
                           value="{% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'interval' %}{{ config.schedule_config.get('end_time', '18:00') }}{% else %}18:00{% endif %}">
                </div>
            </div>
        </div>

        <!-- 一次性配置 -->
        <div id="once-fields" class="schedule-fields" style="display: none;">
            <div class="form-group">
                <label for="execute_time">执行时间 *</label>
                <input type="datetime-local" name="execute_time" id="execute_time"
                       value="{% if config and config.get('schedule_config') and config.schedule_config.get('type') == 'once' %}{{ config.schedule_config.get('execute_time', '').replace(' ', 'T') }}{% endif %}">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存配置</button>
            <a href="{{ url_for('main.schedule_list') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>

    <div id="result" class="result"></div>
</div>

<style>
.form-card {
    max-width: 800px;
}

.form-row {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.form-group {
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
}

.form-group label {
    display: block;
    margin-bottom: 0;
    font-weight: 500;
    min-width: 120px;
    white-space: nowrap;
}

.form-group input,
.form-group select {
    flex: 1;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 1rem;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
}

.form-group small {
    display: block;
    margin-top: 0.25rem;
    color: #666;
    font-size: 0.85rem;
}

.schedule-fields {
    background: #f9f9f9;
    padding: 1rem;
    border-radius: 6px;
    margin-bottom: 1rem;
}

.form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
}

.btn-secondary {
    background: var(--secondary);
    color: white;
    text-decoration: none;
    padding: 0.75rem 1.5rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.btn-secondary:hover {
    background: #5a6268;
}

.alert {
    padding: 1rem;
    border-radius: 6px;
    margin-bottom: 1rem;
}

.alert-error {
    background: #f8d7da;
    color: #842029;
    border: 1px solid #f5c2c7;
}

.result {
    margin-top: 1rem;
}

.success {
    color: var(--success);
    padding: 1rem;
    background: #d4edda;
    border-radius: 6px;
}

.error {
    color: var(--danger);
    padding: 1rem;
    background: #f8d7da;
    border-radius: 6px;
}
</style>

<script>
function updateScheduleFields() {
    const type = document.getElementById('schedule_type').value;
    document.getElementById('cron-fields').style.display = type === 'cron' ? 'block' : 'none';
    document.getElementById('interval-fields').style.display = type === 'interval' ? 'block' : 'none';
    document.getElementById('once-fields').style.display = type === 'once' ? 'block' : 'none';
}

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', () => {
    updateScheduleFields();
});

// 表单提交
document.getElementById('schedule-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const result = document.getElementById('result');
    
    try {
        const response = await fetch(window.location.href, {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        
        if (data.success) {
            result.innerHTML = `<p class="success">✅ ${data.message}</p>`;
            setTimeout(() => {
                window.location.href = '{{ url_for("main.schedule_list") }}';
            }, 1500);
        } else {
            result.innerHTML = `<p class="error">❌ ${data.error}</p>`;
        }
    } catch (err) {
        result.innerHTML = `<p class="error">❌ 请求失败: ${err.message}</p>`;
    }
});
</script>
{% endblock %}
